name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
          - os: macos-latest
            system: aarch64-darwin

    runs-on: ${{ matrix.os }}
    name: build (${{ matrix.system }})

    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/flakehub-cache-action@v1
      - run: nix build .
